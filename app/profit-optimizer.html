  <script>
    window.currentMode = 'product'; 
    window.currentData = []; 
    window.currentView = 'data';
    window.currentCurrency = 'INR';
    window.currencySymbol = '₹';
    let myChart = null; 

    // FIX 1: Robust Data Scraper that is forced to run right before sending to AI
    function getFreshData() {
        let data = [];
        document.querySelectorAll('#items .data-row').forEach(row => {
            const nameInput = row.querySelector('.input-name');
            const sellInput = row.querySelector('.input-sell');
            const costInput = row.querySelector('.input-cost');
            const qtyInput = row.querySelector('.input-qty');
            
            if(!nameInput || !sellInput || !costInput || !qtyInput) return;

            const name = nameInput.value.trim();
            const sell = parseFloat(sellInput.value) || 0;
            const cost = parseFloat(costInput.value) || 0;
            const qty = parseFloat(qtyInput.value) || 0;
            
            if(name !== '' || sell > 0 || cost > 0 || qty > 0) {
                data.push({ name, sell, cost, qty });
            }
        });
        return data;
    }

    function updateCurrency() {
      const sel = document.getElementById('currencySelect');
      window.currentCurrency = sel.value;
      window.currencySymbol = sel.options[sel.selectedIndex].text.split(' ')[0];
      document.getElementById('hdr-sell').innerText = `Sell Price (${window.currencySymbol})`;
      document.getElementById('hdr-cost').innerText = `Cost Price (${window.currencySymbol})`;
    }

    function formatCurrency(num) {
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: window.currentCurrency, maximumFractionDigits: 0 }).format(num);
    }

    const proViews = ['dashboard', 'ai', 'report', 'history'];

    function switchView(viewId, element, bypassPaywall = false) {
      window.currentView = viewId;
      if(proViews.includes(viewId) && window.isProUser === false && !bypassPaywall) {
        document.getElementById('proLockOverlay').classList.remove('pro-lock-hidden');
        document.querySelectorAll('.app-view').forEach(v => v.style.filter = "blur(6px)");
      } else {
        document.getElementById('proLockOverlay').classList.add('pro-lock-hidden');
        document.querySelectorAll('.app-view').forEach(v => v.style.filter = "none");
      }
      document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      if (element) {
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        element.classList.add('active');
      }
    }

    function addNewRow(name='', sell='', cost='', qty='') {
      const container = document.getElementById('items');
      const row = document.createElement('div');
      row.className = 'data-row';
      row.innerHTML = `<input type="text" placeholder="Product Name" class="input-name" value="${name}"><input type="number" placeholder="Sell Price" class="input-sell" value="${sell}"><input type="number" placeholder="Cost Price" class="input-cost" value="${cost}"><input type="number" placeholder="Quantity" class="input-qty" value="${qty}"><button class="delete-btn" onclick="this.parentElement.remove()">×</button>`;
      container.appendChild(row);
    }

    function loadDemoData() {
      document.getElementById('items').innerHTML = ''; 
      addNewRow('Wireless Earbuds', '2500', '1200', '140');
      addNewRow('Smart Watch', '4500', '2800', '85');
      addNewRow('USB-C Cable', '400', '150', '300');
      addNewRow('Phone Case', '600', '700', '50');
    }

    function processDataAndShowReport() {
      if(window.isProUser === false) { switchView('dashboard', document.getElementById('nav-dashboard')); return; }

      const freshData = getFreshData();
      if(freshData.length === 0) return alert("Please enter data first.");
      
      window.currentData = freshData;

      let totalRevenue = 0, totalCost = 0, totalProfit = 0, totalItems = 0;
      let chartLabels = [], chartRevData = [], chartProfitData = [];
      let reportHTML = '', topProduct = { name: '-', profit: -Infinity, qty: 0 }, profitLeaks = [];

      freshData.forEach(item => {
        const rev = item.sell * item.qty; 
        const itemCost = item.cost * item.qty; 
        const profit = rev - itemCost;
        const margin = rev > 0 ? ((profit / rev) * 100).toFixed(1) : 0;

        totalRevenue += rev; totalCost += itemCost; totalProfit += profit; totalItems += item.qty;
        if(profit > topProduct.profit && item.qty > 0) topProduct = { name: item.name, profit, qty: item.qty };
        if(profit < 0) profitLeaks.push(item.name);

        chartLabels.push(item.name); chartRevData.push(rev); chartProfitData.push(profit);

        let statusHtml = profit > 0 ? `<span class="status-pill status-healthy">Healthy</span>` : `<span class="status-pill status-leak">Leak</span>`;
        reportHTML += `<tr><td style="font-weight: 600;">${item.name}</td><td>${formatCurrency(rev)}</td><td>${formatCurrency(itemCost)}</td><td style="font-weight: 700; color: ${profit < 0 ? '#dc2626' : 'inherit'};">${formatCurrency(profit)}</td><td>${margin}%</td><td>${statusHtml}</td></tr>`;
      });

      let overallMargin = totalRevenue > 0 ? ((totalProfit / totalRevenue) * 100) : 0;
      
      let healthScore = 70; 
      if(overallMargin > 40) healthScore += 20;
      else if(overallMargin > 20) healthScore += 10;
      else if(overallMargin < 10) healthScore -= 20;
      healthScore -= (profitLeaks.length * 15);
      healthScore = Math.max(0, Math.min(100, healthScore));

      document.getElementById('dash-revenue').innerText = formatCurrency(totalRevenue);
      document.getElementById('dash-profit').innerText = formatCurrency(totalProfit);
      document.getElementById('dash-margin').innerText = overallMargin.toFixed(1) + '%';
      document.getElementById('dash-top-product').innerText = topProduct.name;
      document.getElementById('reportTableBody').innerHTML = reportHTML;

      const hc = document.getElementById('health-circle');
      hc.innerText = healthScore + '%';
      if(healthScore >= 80) { hc.style.background = '#d1fae5'; hc.style.color = '#059669'; }
      else if(healthScore >= 50) { hc.style.background = '#fef3c7'; hc.style.color = '#d97706'; }
      else { hc.style.background = '#fee2e2'; hc.style.color = '#dc2626'; }

      let insightsHTML = '';
      let pdfInsights = '';
      
      if (topProduct.profit > 0) {
        insightsHTML += `<div style="padding: 12px; background: white; border-radius: 8px; border: 1px solid #e2e8f0;"><strong>1. Scale Top Performer:</strong> ${topProduct.name} generated ${formatCurrency(topProduct.profit)}. Increase ad spend on this item by 10%.</div>`;
        pdfInsights += `<li style="margin-bottom: 12px;"><strong>Scale Winner:</strong> ${topProduct.name} generates the highest profit mass. Increase visibility.</li>`;
      } else {
        insightsHTML += `<div style="padding: 12px; background: white; border-radius: 8px; border: 1px solid #e2e8f0;"><strong>1. Raise Prices:</strong> You have no highly profitable products. Raise prices 10% immediately.</div>`;
        pdfInsights += `<li style="margin-bottom: 12px;"><strong>Raise Prices:</strong> No core profitable products detected. Implement a price increase.</li>`;
      }

      if (profitLeaks.length > 0) {
        insightsHTML += `<div style="padding: 12px; background: #fef2f2; border-radius: 8px; border: 1px solid #fecaca; color: #dc2626;"><strong>2. Stop Profit Leaks:</strong> ${profitLeaks.join(', ')} are currently operating at a loss. Reprice or discontinue them.</div>`;
        pdfInsights += `<li style="margin-bottom: 12px; color: #dc2626;"><strong>Fix Leaks:</strong> ${profitLeaks.join(', ')} are losing money. Fix unit economics or drop them.</li>`;
      } else {
        insightsHTML += `<div style="padding: 12px; background: #ecfdf5; border-radius: 8px; border: 1px solid #a7f3d0; color: #059669;"><strong>2. Unit Economics Safe:</strong> Zero products are losing money. Your baseline is highly secure.</div>`;
        pdfInsights += `<li style="margin-bottom: 12px;"><strong>Secure Economics:</strong> Zero products are currently operating at a net loss.</li>`;
      }

      if (overallMargin < 20) {
        insightsHTML += `<div style="padding: 12px; background: white; border-radius: 8px; border: 1px solid #e2e8f0;"><strong>3. Margin Warning:</strong> An average margin of ${overallMargin.toFixed(1)}% is dangerous. Bundle items to increase Average Order Value.</div>`;
        pdfInsights += `<li><strong>Increase Margin:</strong> Your ${overallMargin.toFixed(1)}% margin is tight. Implement product bundling.</li>`;
      } else {
        insightsHTML += `<div style="padding: 12px; background: white; border-radius: 8px; border: 1px solid #e2e8f0;"><strong>3. Healthy Margin:</strong> ${overallMargin.toFixed(1)}% gives you excellent cash flow to aggressively invest in growth.</div>`;
        pdfInsights += `<li><strong>Healthy Margin:</strong> ${overallMargin.toFixed(1)}% provides excellent flexibility for scaling operations.</li>`;
      }
      
      document.getElementById('auto-insights-list').innerHTML = insightsHTML;
      document.getElementById('pdf-insight-list').innerHTML = pdfInsights;

      document.getElementById('pdf-rev').innerText = formatCurrency(totalRevenue);
      document.getElementById('pdf-cost').innerText = formatCurrency(totalCost);
      document.getElementById('pdf-profit').innerText = formatCurrency(totalProfit);
      document.getElementById('pdf-units-sold').innerText = totalItems;
      document.getElementById('pdf-margin').innerText = overallMargin.toFixed(1) + '%';
      document.getElementById('pdf-top-prod').innerText = topProduct.name;

      const ctx = document.getElementById('profitChart').getContext('2d');
      if(myChart) myChart.destroy();
      myChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: chartLabels, datasets: [{ label: 'Revenue', data: chartRevData, backgroundColor: '#cbd5e1', borderRadius: 4 }, { label: 'Profit', data: chartProfitData, backgroundColor: '#4f46e5', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' } }, scales: { x: { grid: { display: false } }, y: { beginAtZero: true } } }
      });

      switchView('dashboard', document.getElementById('nav-dashboard'));
    }

    // FIX 2: THE BULLETPROOF PDF ENGINE
    function exportExecutivePDF() {
      // Grab Chart
      const chartCanvas = document.getElementById('profitChart');
      if(chartCanvas) {
          document.getElementById('pdf-chart-image').src = chartCanvas.toDataURL('image/png');
      }

      // Clone the template so we can show it without ruining the screen
      const originalElement = document.getElementById('pdf-export-container');
      const clone = originalElement.cloneNode(true);
      
      // Inject clone into the body, make it visible but invisible to the user (opacity)
      clone.id = "pdf-clone";
      clone.style.display = 'block';
      clone.style.position = 'absolute';
      clone.style.top = '0';
      clone.style.left = '0';
      clone.style.zIndex = '-9999';
      clone.style.opacity = '0.01'; 
      document.body.appendChild(clone);

      const opt = {
        margin:       [0.5, 0.5],
        filename:     'Vizbix_Executive_Summary.pdf',
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 2, useCORS: true, windowWidth: 1200 },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
      };
      
      // Give browser 100ms to paint the clone, take picture, then delete it.
      setTimeout(() => {
          html2pdf().set(opt).from(clone).save().then(() => {
              clone.remove(); 
          });
      }, 100);
    }

    let hasVerified = false;
    setInterval(() => {
      const globalLoginBtn = document.getElementById('headerLoginBtn');
      if(window.userEmail) {
        if(globalLoginBtn) globalLoginBtn.style.display = 'none';
        document.getElementById('sidebarEmail').innerText = window.userEmail;
        document.getElementById('settingsEmail').innerText = window.userEmail;
        if(!hasVerified && typeof window.verify === 'function') { hasVerified = true; window.verify(window.userEmail); }
      }
      
      if(window.isProUser) {
        const planText = `Pro Active (${window.proDaysLeft || 'Active'})`;
        document.getElementById('sidebarPlan').innerText = planText;
        document.getElementById('settingsPlan').innerText = planText;
        document.getElementById('settingsPlan').style.color = '#059669'; 
        const upgradeBtn = document.getElementById('upgradeBtn');
        if(upgradeBtn) upgradeBtn.style.display = 'none';

        document.getElementById('proLockOverlay').classList.add('pro-lock-hidden');
        document.querySelectorAll('.app-view').forEach(v => v.style.filter = "none");

      } else if (window.isProUser === false) {
        document.getElementById('sidebarPlan').innerText = "Free User";
        document.getElementById('settingsPlan').innerText = "Free Plan (Limited)";
        const upgradeBtn = document.getElementById('upgradeBtn');
        if(upgradeBtn) upgradeBtn.style.display = 'block';
      }
    }, 1000);
  </script>
